name: Update profile art

"on":
  schedule:
    - cron: "17 6 * * *"   # Runs daily at ~06:17 UTC
  workflow_dispatch: {}
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/fetch_contributions.py
      - run: python scripts/render_heatmap_svg.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh live contribution heatmap [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg"
