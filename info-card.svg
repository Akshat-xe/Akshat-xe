<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 390" width="430" height="390">
<defs>

        <style>
            @keyframes pulseBorder {
                0% { stroke: #2a2e39; filter: drop-shadow(0 0 2px rgba(214,40,57,0.2)); }
                50% { stroke: #801b25; filter: drop-shadow(0 0 8px rgba(214,40,57,0.6)); }
                100% { stroke: #2a2e39; filter: drop-shadow(0 0 2px rgba(214,40,57,0.2)); }
            }
            .card-bg {
                fill: #0d0e12;
                rx: 12px;
                stroke: #801b25;
                stroke-width: 1.5px;
                animation: pulseBorder 4s ease-in-out infinite;
            }
            .top-bar { fill: #16181f; rx: 12px 12px 0 0; }
            .btn-red { fill: #ff4d4d; }
            .btn-yellow { fill: #ffbd2e; }
            .btn-green { fill: #27c93f; }
            
            .term-title {
                font-family: "JetBrains Mono", "Fira Code", "SFMono-Regular", Consolas, monospace;
                font-size: 11px;
                fill: #8b949e;
                font-weight: 600;
            }
            
            .line {
                font-family: "JetBrains Mono", "Fira Code", "SFMono-Regular", Consolas, monospace;
                font-size: 11.5px;
                opacity: 1;
                animation: line-fade 0.4s ease-out forwards;
            }
            
            @keyframes line-fade {
                0% { opacity: 0; transform: translateY(6px); }
                100% { opacity: 1; transform: translateY(0); }
            }

            @keyframes statusGlow {
                0% { fill: #ff3b4e; filter: drop-shadow(0 0 2px #ff3b4e); }
                50% { fill: #ff6b7a; filter: drop-shadow(0 0 7px #ff6b7a); }
                100% { fill: #ff3b4e; filter: drop-shadow(0 0 2px #ff3b4e); }
            }
            .status-dot {
                animation: statusGlow 2s infinite ease-in-out;
            }

            .prompt-user { fill: #ff4d4d; font-weight: 700; }
            .prompt-colon { fill: #8b949e; font-weight: 500; }
            .prompt-path { fill: #58a6ff; font-weight: 600; }
            .prompt-symbol { fill: #ff4d4d; font-weight: 800; }
            .cmd { fill: #ffffff; font-weight: 700; filter: drop-shadow(0 0 3px rgba(255,255,255,0.4)); }
            .key { fill: #8b949e; font-weight: 500; }
            .val { fill: #f0f6fc; font-weight: 600; }
            .accent { fill: #ff4d4d; font-weight: 700; filter: drop-shadow(0 0 4px rgba(255,77,77,0.4)); }
            .subtext { fill: #ff4d4d; font-style: italic; font-size: 11.5px; font-weight: 700; filter: drop-shadow(0 0 5px rgba(255,77,77,0.5)); }
            .separator { fill: #262c36; }
            .badge { fill: #161013; stroke: #4a151b; stroke-width: 1.2; rx: 5; }
            .badge-txt { fill: #ff4d4d; font-size: 10px; font-weight: 700; font-family: "JetBrains Mono", Consolas, monospace; }
        </style>
    
</defs>
<rect class="card-bg" width="430" height="390" />
<rect class="top-bar" width="430" height="32" />
<circle cx="18" cy="16" r="5.5" class="btn-red" />
<circle cx="34" cy="16" r="5.5" class="btn-yellow" />
<circle cx="50" cy="16" r="5.5" class="btn-green" />
<text x="215.0" y="20" text-anchor="middle" class="term-title">akshat@evershtar ~ $ neofetch</text>
<text x="20" y="56" class="line" style="animation-delay: 0.05s;"><tspan class="prompt-user">akshat@evershtar</tspan><tspan class="prompt-colon">:</tspan><tspan class="prompt-path">~</tspan><tspan class="prompt-symbol"> $ </tspan><tspan class="cmd">neofetch</tspan></text>
<text x="20" y="64" class="line" style="animation-delay: 0.1s;"><tspan class="separator">---------------------------------------</tspan></text>
<text x="20" y="88" class="line" style="animation-delay: 0.15s;"><tspan class="key">Institute:</tspan> <tspan class="val">Newton School of Tech (NST)</tspan></text>
<text x="20" y="112" class="line" style="animation-delay: 0.2s;"><tspan class="key">Role     :</tspan> <tspan class="accent">Founder &amp; Lead Builder @ Ever Shtar</tspan></text>
<text x="20" y="136" class="line" style="animation-delay: 0.25s;"><tspan class="key">Exp      :</tspan> <tspan class="val">17 y/o (1.5+ Years Building)</tspan></text>
<text x="20" y="160" class="line" style="animation-delay: 0.3s;"><tspan class="key">Focus    :</tspan> <tspan class="val">Full-Stack Web · AI · Automation</tspan></text>
<text x="20" y="184" class="line" style="animation-delay: 0.35s;"><tspan class="key">Products :</tspan> <tspan class="val">Pleiades Shtar · Lens Shtar · Shipped</tspan></text>
<text x="20" y="208" class="line" style="animation-delay: 0.4s;"><tspan class="key">Stack    :</tspan> <tspan class="val">Python · JS · FastAPI · React · HTML</tspan></text>
<text x="20" y="232" class="line" style="animation-delay: 0.45s;"><tspan class="key">Status   :</tspan> <tspan class="status-dot">●</tspan> <tspan class="accent">Building what shouldn't exist yet</tspan></text>
<text x="20" y="244" class="line" style="animation-delay: 0.5s;"><tspan class="separator">---------------------------------------</tspan></text>
<text x="20" y="268" class="line" style="animation-delay: 0.55s;"><tspan class="subtext">"Great systems should feel invisible."</tspan></text>
<g class="line" style="animation-delay: 0.6s;">
<rect x="20" y="294" width="24" height="15" rx="3" fill="#16161a" />
<rect x="50" y="294" width="24" height="15" rx="3" fill="#3d1419" />
<rect x="80" y="294" width="24" height="15" rx="3" fill="#801b25" />
<rect x="110" y="294" width="24" height="15" rx="3" fill="#d62839" />
<rect x="140" y="294" width="24" height="15" rx="3" fill="#ffffff" />
</g>
<g class="line" style="animation-delay: 0.65s;">
<rect x="20" y="330" width="122" height="24" class="badge" />
<text x="81" y="346" text-anchor="middle" class="badge-txt">⚡ SHIPPED APPS</text>
<rect x="150" y="330" width="128" height="24" class="badge" />
<text x="214" y="346" text-anchor="middle" class="badge-txt">🚀 100% SOLO BUILT</text>
<rect x="286" y="330" width="124" height="24" class="badge" />
<text x="348" y="346" text-anchor="middle" class="badge-txt">🌐 EVER SHTAR</text>
</g>
</svg>